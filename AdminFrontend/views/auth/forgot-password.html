<!-- Modern Forgot Password Page - Step 1: Enter Email -->
<div class="modern-login-page">
    <div class="login-background"></div>
    
    <div class="login-glass-container">
        <div class="login-brand">
            <div class="login-logo-circle">
                <i class="fas fa-key"></i>
            </div>
            <h1 class="login-brand-title">Quên mật khẩu</h1>
            <p class="login-brand-subtitle">Nhập email để nhận mã OTP</p>
        </div>
        
        <!-- Error Message -->
        <div ng-if="error" class="login-error-message">
            <i class="fas fa-exclamation-circle"></i>
            <span>{{error}}</span>
        </div>
        
        <!-- Success Message -->
        <div ng-if="success" class="login-success-message">
            <i class="fas fa-check-circle"></i>
            <span>{{success}}</span>
        </div>
        
        <!-- Email Form -->
        <form ng-submit="sendOTP($event)" ng-if="!otpSent" class="login-glass-form" novalidate>
            <div class="login-input-group">
                <div class="login-input-wrapper" ng-class="{'login-input-error': error && (!email || !isValidEmail(email))}">
                    <i class="fas fa-envelope login-input-icon"></i>
                    <input 
                        type="text" 
                        class="login-input" 
                        ng-model="email" 
                        placeholder="Nhập email của bạn"
                        autocomplete="email"
                        id="forgot-email"
                        ng-keyup="$event.keyCode === 13 && sendOTP($event)"
                        ng-change="error = null"
                        autofocus>
                </div>
            </div>
            
            <button 
                type="submit" 
                class="login-btn-primary" 
                ng-disabled="loading || !email || !isValidEmail(email)">
                <span ng-if="!loading">
                    <i class="fas fa-paper-plane"></i> Gửi mã OTP
                </span>
                <span ng-if="loading">
                    <i class="fas fa-spinner fa-spin"></i> Đang gửi...
                </span>
            </button>
            
            <div class="login-footer-links">
                <a href="#!/login" class="login-link-primary">
                    <i class="fas fa-arrow-left"></i> Quay lại đăng nhập
                </a>
            </div>
        </form>
        
        <!-- Success State - Email Sent -->
        <div ng-if="otpSent" class="otp-sent-message">
            <div class="otp-sent-icon">
                <i class="fas fa-envelope-open-text"></i>
            </div>
            <h3>Mã OTP đã được gửi!</h3>
            <p>Chúng tôi đã gửi mã OTP 4 số đến email <strong>{{email}}</strong></p>
            <p class="otp-note">Vui lòng kiểm tra hộp thư (kể cả thư mục spam)</p>
            
            <div class="otp-actions">
                <button 
                    type="button" 
                    class="login-btn-secondary"
                    ng-click="goToVerifyOTP()">
                    <i class="fas fa-key"></i> Nhập mã OTP
                </button>
                <button 
                    type="button" 
                    class="login-btn-outline"
                    ng-click="resendOTP()"
                    ng-disabled="resendCooldown > 0">
                    <i class="fas fa-redo" ng-class="{'fa-spin': resendCooldown > 0}"></i> 
                    <span ng-if="resendCooldown > 0">Gửi lại sau {{resendCooldown}}s</span>
                    <span ng-if="resendCooldown === 0">Gửi lại mã OTP</span>
                </button>
            </div>
            
            <div class="login-footer-links">
                <a href="#!/login" class="login-link-secondary">
                    <i class="fas fa-arrow-left"></i> Quay lại đăng nhập
                </a>
            </div>
        </div>
    </div>
</div>
