<!-- Modern Verify OTP Page - Step 2: Enter OTP -->
<div class="modern-login-page">
    <div class="login-background"></div>
    
    <div class="login-glass-container">
        <div class="login-brand">
            <div class="login-logo-circle">
                <i class="fas fa-shield-alt"></i>
            </div>
            <h1 class="login-brand-title">Xác thực OTP</h1>
            <p class="login-brand-subtitle">Nhập mã OTP 4 số đã gửi đến email</p>
        </div>
        
        <!-- Error Message -->
        <div ng-if="error" class="login-error-message">
            <i class="fas fa-exclamation-circle"></i>
            <span>{{error}}</span>
        </div>
        
        <!-- OTP Form -->
        <form ng-submit="verifyOTP()" ng-if="!otpVerified" class="login-glass-form">
            <div class="otp-info">
                <p class="otp-email">
                    <i class="fas fa-envelope"></i> {{email}}
                </p>
                <p class="otp-timer" ng-class="{'timer-warning': remainingSeconds < 60, 'timer-expired': remainingSeconds === 0}">
                    <i class="fas fa-clock"></i> 
                    <span ng-if="remainingSeconds > 0">
                        Mã OTP còn hiệu lực: <strong>{{formatTime(remainingSeconds)}}</strong>
                    </span>
                    <span ng-if="remainingSeconds === 0" class="expired-text">
                        Mã OTP đã hết hạn
                    </span>
                </p>
            </div>
            
            <!-- OTP Input Fields -->
            <div class="otp-input-container">
                <input 
                    type="text" 
                    class="otp-input" 
                    ng-model="otpDigits[0]"
                    ng-keyup="moveToNext($event, 0)"
                    maxlength="1"
                    pattern="[0-9]"
                    required
                    autofocus
                    id="otp-0">
                <input 
                    type="text" 
                    class="otp-input" 
                    ng-model="otpDigits[1]"
                    ng-keyup="moveToNext($event, 1)"
                    maxlength="1"
                    pattern="[0-9]"
                    required
                    id="otp-1">
                <input 
                    type="text" 
                    class="otp-input" 
                    ng-model="otpDigits[2]"
                    ng-keyup="moveToNext($event, 2)"
                    maxlength="1"
                    pattern="[0-9]"
                    required
                    id="otp-2">
                <input 
                    type="text" 
                    class="otp-input" 
                    ng-model="otpDigits[3]"
                    ng-keyup="moveToNext($event, 3)"
                    maxlength="1"
                    pattern="[0-9]"
                    required
                    id="otp-3">
            </div>
            
            <button 
                type="submit" 
                class="login-btn-primary" 
                ng-disabled="loading || remainingSeconds === 0 || !isOTPComplete()">
                <span ng-if="!loading">
                    <i class="fas fa-check"></i> Xác thực
                </span>
                <span ng-if="loading">
                    <i class="fas fa-spinner fa-spin"></i> Đang xác thực...
                </span>
            </button>
            
            <div class="otp-actions">
                <button 
                    type="button" 
                    class="login-btn-outline"
                    ng-click="resendOTP()"
                    ng-disabled="resendCooldown > 0 || remainingSeconds > 0">
                    <i class="fas fa-redo" ng-class="{'fa-spin': resendCooldown > 0}"></i> 
                    <span ng-if="resendCooldown > 0">Gửi lại sau {{resendCooldown}}s</span>
                    <span ng-if="resendCooldown === 0 && remainingSeconds === 0">Gửi lại mã OTP</span>
                    <span ng-if="resendCooldown === 0 && remainingSeconds > 0">Gửi mã OTP mới</span>
                </button>
            </div>
            
            <div class="login-footer-links">
                <a href="#!/forgot-password" class="login-link-secondary">
                    <i class="fas fa-arrow-left"></i> Quay lại
                </a>
                <a href="#!/login" class="login-link-secondary">
                    <i class="fas fa-home"></i> Về trang đăng nhập
                </a>
            </div>
        </form>
        
        <!-- Success State - OTP Verified -->
        <div ng-if="otpVerified" class="otp-verified-message">
            <div class="otp-verified-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <h3>Xác thực thành công!</h3>
            <p>Mã OTP hợp lệ. Bạn có thể đặt lại mật khẩu ngay bây giờ.</p>
            
            <div class="otp-actions">
                <button 
                    type="button" 
                    class="login-btn-primary"
                    ng-click="goToResetPassword()"
                    ng-disabled="loading">
                    <span ng-if="!loading">
                        <i class="fas fa-key"></i> Đặt lại mật khẩu
                    </span>
                    <span ng-if="loading">
                        <i class="fas fa-spinner fa-spin"></i> Đang xử lý...
                    </span>
                </button>
            </div>
        </div>
    </div>
</div>
